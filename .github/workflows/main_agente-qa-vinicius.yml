# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - agente-qa-vinicius

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: viniciusacr123.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_21496D409E2E4AD3A6B1A1C5F866A1F4 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_0C05986B2547460BA26084D085A2F5AA }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: viniciusacr123.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_21496D409E2E4AD3A6B1A1C5F866A1F4 }}/viniciusacr123.azurecr.io/api:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B6520FB52FA8499385F91A0E83465031 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6361026187F9461C9AF4392311FED527 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_01BFEDB0119043C9A3D0A82A4C95955D }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'agente-qa-vinicius'
          slot-name: 'Production'
          images: 'viniciusacr123.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_21496D409E2E4AD3A6B1A1C5F866A1F4 }}/viniciusacr123.azurecr.io/api:${{ github.sha }}'
          